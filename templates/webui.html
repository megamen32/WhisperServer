<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Whisper сервер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: dark;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(165deg, #050505, #0a1431 50%, #071728);
            color: #f4f6fb;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page {
            width: 100%;
            padding: 32px 20px;
            display: flex;
            justify-content: center;
        }
        .ui-card {
            width: min(780px, 100%);
            background: rgba(6, 8, 19, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 36px;
            padding: 36px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
        }
            .mic-icon {
                margin: 0 auto 24px;
                width: 140px;
                height: 140px;
                border-radius: 50%;
                border: 4px solid rgba(255, 255, 255, 0.4);
                background: radial-gradient(circle at 30% 15%, rgba(125, 210, 255, 0.35), transparent 60%),
                    radial-gradient(circle at 70% 35%, rgba(120, 96, 255, 0.4), transparent 55%),
                    rgba(20, 28, 48, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 64px;
                color: #8ae1ff;
                box-shadow: 0 12px 25px rgba(0, 0, 0, 0.45);
                cursor: pointer;
                transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            }
            .mic-icon:hover {
                transform: translateY(-2px);
            }
            .mic-icon.recording {
                border-color: #ff9f9f;
                box-shadow: 0 0 30px rgba(255, 110, 110, 0.6), 0 12px 25px rgba(0, 0, 0, 0.4);
            }
            .mic-label {
                text-align: center;
                color: rgba(255, 255, 255, 0.7);
                font-size: 0.95rem;
                margin-top: -12px;
                margin-bottom: 20px;
            }
            .drop-zone {
            border: 2px dashed rgba(252, 252, 252, 0.35);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            font-size: 1rem;
            line-height: 1.5;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        .drop-zone.active {
            border-color: #72d6ff;
            background: rgba(114, 214, 255, 0.05);
        }
        .drop-zone.working {
            border-color: #36d6b8;
        }
        .drop-zone .button-link {
            color: #84d2ff;
            text-decoration: underline;
            cursor: pointer;
        }
        #file-input {
            display: none;
        }
        .controls {
            margin-top: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: flex-end;
        }
        .control {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control span {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }
        select,
        input[type='text'] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            color: #f4f6fb;
            font-size: 1rem;
            outline: none;
        }
        select:focus,
        input[type='text']:focus {
            border-color: #89e5ff;
            background: rgba(255, 255, 255, 0.08);
        }
        #toggle-times {
            border: none;
            background: linear-gradient(135deg, #46b5ff, #6b58ff);
            color: white;
            padding: 11px 22px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(34, 92, 255, 0.35);
            transition: transform 0.2s ease;
        }
        #toggle-times:active {
            transform: translateY(2px);
        }
        .progress-track {
            margin-top: 24px;
            width: 100%;
            height: 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #7df2ff, #5ba7ff);
            transition: width 0.4s ease;
        }
        .progress-meta {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #9bbdff;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }
        .progress-meta.visible {
            opacity: 1;
            pointer-events: auto;
            height: auto;
        }
        .upload-track {
            margin-top: 18px;
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transition: opacity 0.2s ease, height 0.2s ease, margin 0.2s ease;
        }
        .upload-bar {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #ffb86b, #ff7d8f);
            transition: width 0.2s ease;
        }
        .upload-track.hidden {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .status-bar {
            margin-top: 12px;
            text-align: center;
            font-size: 0.95rem;
            color: #b2d2ff;
        }
        .output {
            margin-top: 24px;
            max-height: 320px;
            overflow-y: auto;
            border-radius: 24px;
            padding: 18px;
            background: rgba(7, 10, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .transcript-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .segment {
            display: flex;
            gap: 12px;
            align-items: baseline;
            font-size: 1rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .segment-text {
            flex: 1;
        }
        .transcript-container.segments-hidden .segment-text {
            display: none;
        }
        .timecode {
            font-size: 0.85rem;
            color: #7bedff;
            min-width: 90px;
            display: none;
        }
        .transcript-container.show-times .timecode {
            display: inline-block;
        }
        .final-output-wrapper {
            position: relative;
            margin-top: 24px;
        }
        .final-output {
            font-weight: 600;
            color: #c5ffe4;
            padding-top: 8px;
        }
        .copy-result-button {
            position: absolute;
            top: -26px;
            left: 4px;
            border: none;
            border-radius: 999px;
            background: #030303;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            line-height: 1;
            transition: background 0.2s ease, transform 0.2s ease;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        }
        .copy-result-button .copy-icon {
            font-size: 18px;
            line-height: 1;
        }
        .copy-result-button.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-2px);
        }
        .copy-result-button:hover {
            background: #181818;
            transform: translateY(-2px);
        }
        .error-output {
            margin-top: 10px;
            color: #ff9ea1;
            min-height: 18px;
        }
        @media (max-width: 640px) {
            .ui-card {
                padding: 28px 20px;
            }
            .controls {
                flex-direction: column;
            }
            .progress-meta {
                flex-direction: column;
                gap: 6px;
            }
            .ui-card,
            .drop-zone,
            .controls,
            .transcript-container,
            .output {
                text-align: center;
            }
            .controls {
                align-items: center;
            }
            .control {
                align-items: center;
            }
            .segment {
                flex-direction: column;
                align-items: center;
            }
            .segment-text {
                text-align: center;
            }
            .transcript-container.show-times .segment {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="ui-card">
            <div class="mic-icon" aria-hidden="true">🎙️</div>
            <div class="mic-label" id="mic-label">Нажмите, чтобы записать</div>
            <div class="drop-zone" id="drop-zone">
                <p>
                    <strong>Перетащите файл сюда</strong><br>
                    или <span class="button-link" id="select-file-button">нажмите, чтобы выбрать файл</span>
                </p>
                <input type="file" id="file-input" accept="audio/*" />
            </div>
            <div class="controls">
                <label class="control">
                    <span>Модель (по умолчанию стандартная)</span>
                    <select id="model-select"></select>
                </label>
                <label class="control" style="display: none;">
                    <span>API-ключ</span>
                </label>
                <button type="button" id="toggle-times">Показать таймкоды</button>
            </div>
            <div class="upload-track hidden">
                <div class="upload-bar" id="upload-bar"></div>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-meta">
                <span id="speed-label">Скорость: —</span>
                <span id="estimate-label">Ожидание: —</span>
            </div>
            <div class="status-bar" id="status-bar">Готово</div>
            <div class="output">
                <div id="transcript" class="transcript-container"></div>
                <div class="final-output-wrapper">
                    <div id="final-output" class="final-output"></div>
                    <button
                        type="button"
                        id="copy-result-button"
                        class="copy-result-button hidden"
                        title="Скопировать результат"
                    >
                        <span class="copy-icon" aria-hidden="true">📋</span>
                        <span class="copy-label">Скопировать</span>
                    </button>
                </div>
                <div id="error-output" class="error-output" aria-live="assertive"></div>
            </div>
        </div>
    <script>
        const DEFAULT_MODEL = 'large-v3';
        let webuiCsrfToken = __WEBUI_CSRF_TOKEN__;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const modelSelect = document.getElementById('model-select');
        const transcriptContainer = document.getElementById('transcript');
        const finalOutput = document.getElementById('final-output');
        const errorOutput = document.getElementById('error-output');
        const statusBar = document.getElementById('status-bar');
        const progressBar = document.getElementById('progress-bar');
        const speedLabel = document.getElementById('speed-label');
        const estimateLabel = document.getElementById('estimate-label');
        const uploadBar = document.getElementById('upload-bar');
        const uploadTrack = document.querySelector('.upload-track');
        const toggleTimes = document.getElementById('toggle-times');
        const micIcon = document.querySelector('.mic-icon');
        const micLabel = document.getElementById('mic-label');
        const copyResultButton = document.getElementById('copy-result-button');
        const progressMeta = document.querySelector('.progress-meta');

        const UPLOAD_SPEED_PREFIX = 'Скорость загрузки:';
        const UPLOAD_ESTIMATE_PREFIX = 'Осталось:';
        const PROCESS_SPEED_PREFIX = 'Скорость:';
        const PROCESS_ESTIMATE_PREFIX = 'Ожидание:';

        let isProcessing = false;
        let showTimecodes = false;
        let startTime = 0;
        let segmentsProcessed = 0;
        let statusInterval = null;
        let estimatedWait = 0;
        let mediaRecorder = null;
        let mediaStream = null;
        let recordedChunks = [];
        let activeXhr = null;
        let currentFile = null;
        let pendingReprocess = false;
        let uploadStartTime = 0;
        let currentUploadTotal = 0;

        const recordingSupported = typeof MediaRecorder !== 'undefined';

        toggleTimes.hidden = true;

        function setStatus(message) {
            statusBar.textContent = message;
        }

        function updateRecordingUI(active) {
            micIcon.classList.toggle('recording', active);
            micLabel.textContent = active ? 'Идет запись… нажмите, чтобы остановить' : 'Нажмите, чтобы записать';
        }

        function cleanupRecordingStream() {
            if (mediaStream) {
                mediaStream.getTracks().forEach((track) => track.stop());
                mediaStream = null;
            }
            mediaRecorder = null;
        }

        async function startRecording() {
            if (isProcessing) {
                errorOutput.textContent = 'Подождите завершения текущей расшифровки';
                return;
            }
            if (!recordingSupported) {
                errorOutput.textContent = 'Ваш браузер не поддерживает запись с микрофона';
                return;
            }
            try {
                recordedChunks = [];
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const preferredMime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus'
                    : 'audio/webm';
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: preferredMime });
                mediaRecorder.addEventListener('dataavailable', (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                });
                mediaRecorder.addEventListener('stop', () => {
                    updateRecordingUI(false);
                    cleanupRecordingStream();
                    if (!recordedChunks.length) {
                        setStatus('Запись отменена');
                        return;
                    }
                    const blob = new Blob(recordedChunks, { type: preferredMime });
                    const file = new File([blob], `recording-${Date.now()}.webm`, { type: blob.type });
                    transcribeFile(file);
                });
                mediaRecorder.addEventListener('error', (event) => {
                    errorOutput.textContent = event.error?.message || 'Ошибка записи';
                    updateRecordingUI(false);
                    cleanupRecordingStream();
                });
                mediaRecorder.start();
                setStatus('Идет запись...');
                updateRecordingUI(true);
            } catch (error) {
                errorOutput.textContent = error.message;
                updateRecordingUI(false);
                cleanupRecordingStream();
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            } else {
                updateRecordingUI(false);
                cleanupRecordingStream();
            }
        }

        function formatTime(value = 0) {
            const minutes = Math.floor(value / 60);
            const seconds = (value % 60).toFixed(2).padStart(5, '0');
            return `${minutes}:${seconds}`;
        }

        function updateProgress(final = false) {
            if (!startTime) {
                progressBar.style.width = final ? '100%' : '0%';
                return;
            }
            const elapsed = Math.max(0.1, (Date.now() - startTime) / 1000);
            const speed = segmentsProcessed / elapsed;
            speedLabel.textContent = `Скорость: ${speed.toFixed(2)} сег/с`;
            const waitLeft = final ? 0 : Math.max(0, estimatedWait - elapsed);
            estimateLabel.textContent = final ? 'Ожидание: завершено' : `Ожидание: ~${waitLeft.toFixed(1)} с`;
            const ratio = final ? 1 : Math.min(1, elapsed / (elapsed + Math.max(waitLeft, 1)));
            progressBar.style.width = `${Math.floor(ratio * 100)}%`;
            progressMeta?.classList.add('visible');
        }

        function formatBytes(value = 0) {
            if (!Number.isFinite(value) || value <= 0) {
                return '0 B';
            }
            const units = ['B', 'KB', 'MB', 'GB'];
            let index = 0;
            let size = value;
            while (size >= 1024 && index < units.length - 1) {
                size /= 1024;
                index += 1;
            }
            return `${size.toFixed(size >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
        }

        function updateUploadProgress(loaded = 0, total = 0, done = false) {
            const safeTotal = total > 0 ? total : Math.max(loaded, 1);
            const ratio = Math.min(1, loaded / safeTotal);
            uploadBar.style.width = `${Math.floor(ratio * 100)}%`;
            const totalBytes = total > 0 ? total : currentUploadTotal;
            const elapsedSeconds = Math.max(0.001, (Date.now() - uploadStartTime) / 1000);
            const bytesPerSecond = Math.max(0, loaded / elapsedSeconds);
            const speedText = bytesPerSecond > 0 ? `${formatBytes(bytesPerSecond)}/с` : '—';
            speedLabel.textContent = `${UPLOAD_SPEED_PREFIX} ${speedText}`;
            if (total > 0 && bytesPerSecond > 0 && !done) {
                const eta = Math.max(0, (total - loaded) / bytesPerSecond);
                const totalText = totalBytes ? formatBytes(totalBytes) : '—';
                const loadedText = totalBytes ? formatBytes(Math.min(loaded, totalBytes)) : formatBytes(loaded);
                estimateLabel.textContent = `${UPLOAD_ESTIMATE_PREFIX} ${eta.toFixed(1)} с · ${loadedText} / ${totalText}`;
            } else if (done && total > 0) {
                const totalText = totalBytes ? formatBytes(totalBytes) : '—';
                estimateLabel.textContent = `${UPLOAD_ESTIMATE_PREFIX} 0.0 с · ${totalText} / ${totalText}`;
            } else {
                const totalText = totalBytes ? formatBytes(totalBytes) : '—';
                const loadedText = formatBytes(loaded);
                estimateLabel.textContent = `${UPLOAD_ESTIMATE_PREFIX} — · ${loadedText} / ${totalText}`;
            }
        }

        function showUploadProgress(totalBytes = 0) {
            uploadTrack.classList.remove('hidden');
            uploadBar.style.width = '0%';
            speedLabel.textContent = `${UPLOAD_SPEED_PREFIX} —`;
            const totalText = totalBytes ? formatBytes(totalBytes) : '—';
            estimateLabel.textContent = `${UPLOAD_ESTIMATE_PREFIX} — · 0 / ${totalText}`;
            uploadStartTime = Date.now();
            currentUploadTotal = totalBytes;
            progressMeta?.classList.add('visible');
        }

        function hideUploadProgress(resetMeta = true) {
            uploadBar.style.width = '0%';
            uploadTrack.classList.add('hidden');
            uploadStartTime = 0;
            if (resetMeta) {
                speedLabel.textContent = `${PROCESS_SPEED_PREFIX} —`;
                estimateLabel.textContent = `${PROCESS_ESTIMATE_PREFIX} —`;
            }
            progressMeta?.classList.remove('visible');
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/status');
                if (!response.ok) {
                    throw new Error('Не удалось получить статус');
                }
                const payload = await response.json();
                const queueSize = Number(payload.queue_size || 0);
                estimatedWait = queueSize * 3 + 1;
                setStatus(queueSize ? `В очереди: ${queueSize}` : 'Обработка запроса...');
                updateProgress();
            } catch (error) {
                setStatus('Не удалось обновить статус очереди');
            }
        }

        function appendSegment(segment) {
            if (!segment) {
                return;
            }
            segmentsProcessed += 1;
            const wrapper = document.createElement('div');
            wrapper.className = 'segment';
            const timestamp = document.createElement('span');
            timestamp.className = 'timecode';
            timestamp.textContent = `${formatTime(segment.start)} → ${formatTime(segment.end)}`;
            const text = document.createElement('div');
            text.className = 'segment-text';
            text.textContent = segment.text;
            wrapper.appendChild(timestamp);
            wrapper.appendChild(text);
            transcriptContainer.appendChild(wrapper);
            transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
            updateProgress();
        }

        function cleanupProcessing({ finalMessage, success = true } = {}) {
            if (statusInterval) {
                clearInterval(statusInterval);
                statusInterval = null;
            }
            dropZone.classList.remove('working');
            if (activeXhr) {
                activeXhr = null;
            }
            if (finalMessage) {
                setStatus(finalMessage);
            }
            isProcessing = false;
            if (success) {
                updateProgress(true);
                toggleTimes.hidden = false;
                showTimecodes = false;
                toggleTimes.textContent = 'Показать таймкоды';
                transcriptContainer.classList.add('segments-hidden');
                transcriptContainer.classList.remove('show-times');
            } else {
                progressBar.style.width = '0%';
                toggleTimes.hidden = true;
            }
            if (pendingReprocess && currentFile) {
                pendingReprocess = false;
                setTimeout(() => transcribeFile(currentFile), 150);
            } else {
                pendingReprocess = false;
            }
            hideUploadProgress(false);
        }

        async function loadModels() {
            try {
                const response = await fetch('/models');
                if (!response.ok) {
                    throw new Error('Не удалось получить список моделей');
                }
                const models = await response.json();
                if (Array.isArray(models) && models.length) {
                    modelSelect.innerHTML = models
                        .map((model) => `<option value="${model}">${model}</option>`)
                        .join('');
                    if (!models.includes(DEFAULT_MODEL)) {
                        modelSelect.prepend(new Option(DEFAULT_MODEL, DEFAULT_MODEL));
                    }
                    modelSelect.value = DEFAULT_MODEL;
                }
            } catch (error) {
                setStatus('Ошибка загрузки моделей');
            }
        }

        async function transcribeFile(file) {
            if (!file || isProcessing) {
                if (isProcessing) {
                    errorOutput.textContent = 'Подождите завершения текущей расшифровки';
                }
                return;
            }
            currentFile = file;
            isProcessing = true;
            segmentsProcessed = 0;
            startTime = Date.now();
            estimatedWait = 0;
            transcriptContainer.innerHTML = '';
            finalOutput.textContent = '';
            hideCopyButton();
            errorOutput.textContent = '';
            progressBar.style.width = '0%';
            showUploadProgress(file.size);
            dropZone.classList.add('working');
            setStatus('Загрузка файла на сервер...');
            transcriptContainer.classList.remove('segments-hidden');
            transcriptContainer.classList.remove('show-times');
            showTimecodes = false;
            toggleTimes.hidden = true;
            const form = new FormData();
            form.append('file', file);
            const requestUrl = new URL('/web/transcribe', window.location.origin);
            requestUrl.searchParams.set('stream', 'true');
            requestUrl.searchParams.set('model', modelSelect.value || DEFAULT_MODEL);

            let buffer = '';
            let responseOffset = 0;
            let hasFailed = false;

            function fail(message) {
                if (hasFailed) {
                    return;
                }
                hasFailed = true;
                errorOutput.textContent = message;
                cleanupProcessing({ finalMessage: 'Ошибка транскрипции', success: false });
                if (activeXhr && activeXhr.readyState !== 4) {
                    activeXhr.abort();
                }
            }

            function handlePayload(payload) {
                if (!payload) {
                    return;
                }
                if (payload.error) {
                    fail(payload.error);
                    return;
                }
                if (payload.segment) {
                    appendSegment(payload.segment);
                }
                if (payload.result && payload.result.text) {
                    finalOutput.textContent = payload.result.text;
                    showCopyButton();
                }
            }

            function drainResponseText(text, flush = false) {
                if (hasFailed) {
                    return;
                }
                const chunk = text.slice(responseOffset);
                responseOffset = text.length;
                if (chunk) {
                    buffer += chunk;
                }
                let newlineIndex;
                while ((newlineIndex = buffer.indexOf('\n')) !== -1) {
                    const line = buffer.slice(0, newlineIndex).trim();
                    buffer = buffer.slice(newlineIndex + 1);
                    if (!line) {
                        continue;
                    }
                    try {
                        const payload = JSON.parse(line);
                        handlePayload(payload);
                    } catch (error) {
                        fail('Ошибка разбора ответа сервера');
                        return;
                    }
                }
                if (flush) {
                    const tail = buffer.trim();
                    if (tail) {
                        try {
                            const payload = JSON.parse(tail);
                            handlePayload(payload);
                        } catch (error) {
                            fail('Ошибка разбора ответа сервера');
                        }
                    }
                    buffer = '';
                }
            }

            const xhr = new XMLHttpRequest();
            activeXhr = xhr;
            xhr.open('POST', requestUrl.toString(), true);
            xhr.responseType = 'text';
            xhr.setRequestHeader('X-Whisper-CSRF', webuiCsrfToken);
            xhr.upload.addEventListener('progress', (event) => {
                if (event.lengthComputable) {
                    updateUploadProgress(event.loaded, event.total);
                } else {
                    updateUploadProgress(event.loaded, file.size);
                }
            });
            xhr.upload.addEventListener('load', () => {
                updateUploadProgress(file.size, file.size, true);
                hideUploadProgress(true);
                setStatus('Файл загружен. Обработка на сервере...');
                refreshStatus();
                statusInterval = setInterval(refreshStatus, 1800);
            });
            xhr.addEventListener('progress', () => {
                drainResponseText(xhr.responseText);
            });
            xhr.addEventListener('error', () => {
                fail('Ошибка сети при загрузке');
            });
            xhr.addEventListener('load', () => {
                if (hasFailed) {
                    return;
                }
                if (xhr.status < 200 || xhr.status >= 300) {
                    fail(xhr.responseText || `Ошибка: ${xhr.status}`);
                    return;
                }
                const nextToken = xhr.getResponseHeader('X-Whisper-Next-CSRF');
                if (nextToken) {
                    webuiCsrfToken = nextToken;
                }
                drainResponseText(xhr.responseText, true);
                cleanupProcessing({ finalMessage: 'Готово', success: true });
            });
            updateUploadProgress(0, file.size);
            xhr.send(form);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragenter', (event) => {
            event.preventDefault();
            dropZone.classList.add('active');
        });
        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('active');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });
        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('active');
            const selectedFile = event.dataTransfer.files?.[0];
            transcribeFile(selectedFile);
        });
        fileInput.addEventListener('change', () => {
            const selectedFile = fileInput.files?.[0];
            transcribeFile(selectedFile);
        });
        micIcon.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                startRecording();
            }
        });
        toggleTimes.addEventListener('click', () => {
            showTimecodes = !showTimecodes;
            transcriptContainer.classList.toggle('show-times', showTimecodes);
            transcriptContainer.classList.toggle('segments-hidden', !showTimecodes);
            toggleTimes.textContent = showTimecodes ? 'Скрыть таймкоды' : 'Показать таймкоды';
        });

        copyResultButton.addEventListener('click', async () => {
            const text = finalOutput.textContent.trim();
            if (!text) {
                setStatus('Нет результата для копирования');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                setStatus('Результат скопирован');
            } catch (error) {
                const fallback = document.createElement('textarea');
                fallback.value = text;
                document.body.appendChild(fallback);
                fallback.select();
                document.execCommand('copy');
                document.body.removeChild(fallback);
                setStatus('Скопировано (резервно)');
            }
        });

        function showCopyButton() {
            copyResultButton.classList.remove('hidden');
        }

        function hideCopyButton() {
            if (!copyResultButton.classList.contains('hidden')) {
                copyResultButton.classList.add('hidden');
            }
        }

        modelSelect.addEventListener('change', () => {
            if (!currentFile) {
                return;
            }
            if (isProcessing) {
                pendingReprocess = true;
                setStatus('Подождите завершения текущей расшифровки — новая модель будет применена автоматически');
            } else {
                transcribeFile(currentFile);
            }
        });

        loadModels();
    </script>
</body>
</html>
